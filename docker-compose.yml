version: '3.8'

services:
  api:
    build: .
    container_name: credit-risk-api
    ports:
      - "8000:8000"
    # Mount data folder so transactions.db persists locally
    volumes:
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: credit-risk-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    environment:
      # Use Docker's internal DNS to route exactly to the API container
      - API_URL=http://api:8000
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
